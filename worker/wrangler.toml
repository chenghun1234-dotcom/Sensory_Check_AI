name = "sensory-check-ai"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────
# KV Namespace — Short-term Cache (TTL 7 days)
# ──────────────────────────────────────────
[[kv_namespaces]]
binding = "SENSORY_CACHE"
id = "REPLACE_WITH_YOUR_KV_ID"          # wrangler kv namespace create sensory-cache

# ──────────────────────────────────────────
# D1 Database — Permanent Analysis Results
# ──────────────────────────────────────────
[[d1_databases]]
binding = "SENSORY_DB"
database_name = "sensory-check-db"
database_id = "REPLACE_WITH_YOUR_D1_ID" # wrangler d1 create sensory-check-db

# ──────────────────────────────────────────
# Workers AI — Llama 3.1 8B Instruct
# ──────────────────────────────────────────
[ai]
binding = "AI"

# ──────────────────────────────────────────
# Environment Variables
# ──────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
CACHE_TTL_DAYS = "7"
MAX_BATCH_SIZE = "5"
API_VERSION = "1.0.0"

# Set RapidAPI secret via: wrangler secret put RAPIDAPI_SECRET
# wrangler secret put RAPIDAPI_SECRET

# ──────────────────────────────────────────
# Development Environment
# ──────────────────────────────────────────
[env.dev]
vars = { ENVIRONMENT = "development" }
